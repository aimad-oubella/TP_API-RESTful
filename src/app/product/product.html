<article class="card product-card h-100">
  <img
    class="card-img-top product-image"
    [src]="product().image || 'https://placehold.co/600x400?text=Product'"
    [alt]="product().title"
  >
  <div class="card-body d-flex flex-column">
    <span class="badge text-bg-light align-self-start mb-2">{{ product().category.title }}</span>
    <h5 class="card-title">{{ product().title | slice:0:40 }}</h5>
    <p class="card-text text-muted flex-grow-1">{{ product().description | slice:0:110 }}</p>
    <div class="d-flex align-items-center justify-content-between gap-2">
      <strong>{{ product().price | currency:'MAD ':'symbol':'1.2-2' }}</strong>
      <a [routerLink]="['/product-details', product().id]" class="btn btn-sm btn-outline-primary">Details</a>
    </div>
  </div>
</article>
